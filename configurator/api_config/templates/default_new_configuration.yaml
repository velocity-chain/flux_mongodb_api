# Default configuration template for new collections (playground/Docker).
# Placeholders: {{collection_name}}
# Same as built-in: configurator/templates/default_new_configuration.yaml
add_indexes:
  - name: nameIndex
    key:
      name: 1
    options:
      unique: false
  - name: statusIndex
    key:
      status: 1
    options:
      unique: false
  - name: createdIndex
    key:
      created.at_time: 1
    options:
      unique: false
  - name: savedIndex
    key:
      last_saved.at_time: 1
    options:
      unique: false
